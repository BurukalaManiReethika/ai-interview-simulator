<!DOCTYPE html>
<html>
<head>
    <title>AI Interview Simulator</title>
</head>
<body>
    <h1>AI Interview Simulator</h1>

    <h3>Question:</h3>
    <p>{{ question }}</p>

    <form action="/evaluate" method="POST">
        <textarea
            name="answer"
            rows="6"
            cols="60"
            placeholder="Type your answer here..."
            required>
        </textarea>

        <br><br>

        <button type="submit">
            Submit Answer
        </button>
    </form>
</body>
</html>
